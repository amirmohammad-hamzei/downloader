name: ⬇️ Download Manager

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - batch
      compression:
        description: 'فشرده‌سازی'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - always
          - never
      password:
        description: 'رمز فایل zip (اختیاری)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'حداکثر حجم هر بخش (MB) - فقط برای فایل‌های >95MB'
        required: false
        default: '90'
        type: string

jobs:
  download-files:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl wget bc p7zip-full

      - name: Download and Process Files
        env:
          SPLIT_MB_INPUT: ${{ github.event.inputs.split_size }}
          PASSWORD_INPUT: ${{ github.event.inputs.password }}
          COMPRESSION_INPUT: ${{ github.event.inputs.compression }}
          MODE_INPUT: ${{ github.event.inputs.mode }}
          URLS_INPUT: ${{ github.event.inputs.urls }}
        run: |
          set -euo pipefail

          # --- Setup ---
          mkdir -p downloads/complete downloads/failed downloads/logs
          
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}"

          SPLIT_MB="${SPLIT_MB_INPUT:-90}"
          PASSWORD="${PASSWORD_INPUT:-}"
          COMPRESSION="${COMPRESSION_INPUT:-auto}"
          MODE="${MODE_INPUT:-single}"
          URLS="${URLS_INPUT:-}"
          MAX_RETRIES=3
          SCRIPT_PID="$$"
          
          # GitHub limit: 100MB, we use 95MB for safety
          GITHUB_LIMIT_MB=95
          GITHUB_LIMIT_BYTES=$((GITHUB_LIMIT_MB * 1024 * 1024))
          SPLIT_BYTES=$((SPLIT_MB * 1024 * 1024))
          PASSFILE=""

          if [ -n "$PASSWORD" ]; then
            PASSFILE=$(mktemp)
            printf '%s' "$PASSWORD" > "$PASSFILE"
            chmod 600 "$PASSFILE"
          fi

          echo "========================================"
          echo "   Download Manager"
          echo "========================================"
          echo "Mode: $MODE | Compression: $COMPRESSION"
          echo "Split: ${SPLIT_MB}MB | Password: $([ -n "$PASSWORD" ] && echo 'YES' || echo 'NO')"
          echo ""

          # --- Helpers ---
          log_ok()    { echo "[OK] $1"; echo "[OK] $1" >> downloads/logs/session.log; }
          log_err()   { echo "[ERROR] $1"; echo "[ERROR] $1" >> downloads/logs/session.log; }
          log_info()  { echo "[INFO] $1"; }

          sanitize() {
            echo "$1" | sed 's/[<>:"|?*\\]/_/g' | sed 's/%20/ /g' | sed 's/[?#].*//'
          }

          need_compress() {
            local f="$1"
            local mode="$2"
            case "$mode" in
              always) return 0 ;;
              never)  return 1 ;;
              auto)
                local ext="${f##*.}"
                ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
                case "$ext" in
                  zip|rar|7z|gz|bz2|xz|tar|iso|dmg|exe|msi|mp4|mkv|avi|mp3|jpg|jpeg|png|gif|pdf) return 1 ;;
                  *) return 0 ;;
                esac ;;
            esac
          }

          download_file() {
            local url="$1"
            local output="$2"
            local fname=$(basename "$output")
            local tmp_output="${output}.tmp.${SCRIPT_PID}"

            for try in $(seq 1 $MAX_RETRIES); do
              log_info "Attempt $try/$MAX_RETRIES: $fname"
              rm -f "$tmp_output"

              if aria2c -q --split=8 --max-connection-per-server=8 --min-split-size=20M \
                --max-tries=1 --retry-wait=10 --timeout=300 --connect-timeout=60 \
                --check-certificate=true --allow-overwrite=true --auto-file-renaming=false \
                --dir="$(dirname "$output")" --out="${fname}.tmp.${SCRIPT_PID}" \
                --file-allocation=none --disk-cache=64M "$url" 2>/dev/null; then
                if [ -s "$tmp_output" ]; then
                  mv "$tmp_output" "$output"
                  log_ok "Downloaded: $fname ($(du -h "$output" | cut -f1))"
                  return 0
                fi
              fi

              log_info "Trying wget..."
              if wget -q --show-progress --tries=2 --timeout=300 --continue \
                -U "Mozilla/5.0" -O "$tmp_output" "$url" 2>&1; then
                if [ -s "$tmp_output" ]; then
                  mv "$tmp_output" "$output"
                  log_ok "Downloaded: $fname"
                  return 0
                fi
              fi

              log_info "Trying curl..."
              if curl -L -f -# --retry 2 --retry-delay 10 --connect-timeout 60 --max-time 3600 \
                -C - -A "Mozilla/5.0" -o "$tmp_output" "$url" 2>&1; then
                if [ -s "$tmp_output" ]; then
                  mv "$tmp_output" "$output"
                  log_ok "Downloaded: $fname"
                  return 0
                fi
              fi

              rm -f "$tmp_output"
              [ $try -lt $MAX_RETRIES ] && sleep $((try * 10))
            done

            log_err "Failed: $fname"
            return 1
          }

          # --- Split Function (only for files > 95MB) ---
          split_large_file() {
            local file_path="$1"
            local output_dir="$2"
            local base_name="$3"
            local final_size="$4"
            local final_name="$5"

            cd "$output_dir" || return 1

            local total_parts=$(( (final_size + SPLIT_BYTES - 1) / SPLIT_BYTES ))
            log_info "Splitting into $total_parts parts..."

            # Step 1: Split raw
            split -b "${SPLIT_MB}M" -d --suffix-length=2 "$final_name" "raw_part_"
            rm -f "$final_name"

            # Step 2: Zip each raw part independently
            local part_num=1
            local zip_failed=false
            local part_files=""

            for raw_part in raw_part_*; do
              [ ! -f "$raw_part" ] && continue
              local zip_part=$(printf "%s.part%02d.zip" "$base_name" "$part_num")
              log_info "  Zipping part $part_num/$total_parts..."

              if [ -n "$PASSWORD" ] && [ -n "$PASSFILE" ]; then
                zip -j -q -P "$(cat "$PASSFILE")" "$zip_part" "$raw_part" 2>/dev/null || {
                  7z a -tzip -mx=0 "-p$(cat "$PASSFILE")" "$zip_part" "$raw_part" >/dev/null 2>&1
                }
              else
                zip -j -q "$zip_part" "$raw_part" 2>/dev/null || {
                  7z a -tzip -mx=0 "$zip_part" "$raw_part" >/dev/null 2>&1
                }
              fi

              # Verify independent ZIP
              if [ -n "$PASSWORD" ] && [ -n "$PASSFILE" ]; then
                unzip -t -P "$(cat "$PASSFILE")" "$zip_part" >/dev/null 2>&1 || zip_failed=true
              else
                unzip -t "$zip_part" >/dev/null 2>&1 || zip_failed=true
              fi

              if [ "$zip_failed" = true ]; then
                log_err "Part $part_num ZIP is corrupted!"
                break
              fi

              rm -f "$raw_part"
              part_files="$part_files $zip_part"
              part_num=$((part_num + 1))
            done

            if [ "$zip_failed" = true ]; then
              rm -f raw_part_* *.part*.zip 2>/dev/null
              cd - > /dev/null
              return 1
            fi

            local parts=$((part_num - 1))
            log_info "Split complete: $parts parts"

            # --- Build README with download links ---
            local _size_mb=$((final_size / 1024 / 1024))
            local download_links=""
            
            for i in $(seq -w 1 $parts); do
              local part_name=$(printf "%s.part%s.zip" "$base_name" "$i")
              local enc_name=$(echo "$part_name" | sed 's/ /%20/g')
              local folder_enc=$(echo "$(basename "$output_dir")" | sed 's/ /%20/g')
              local link="${REPO_URL}/raw/${BRANCH}/downloads/complete/${folder_enc}/${enc_name}"
              download_links="${download_links}| \`${part_name}\` | [Download](${link}) |"$'\n'
            done

            cat > README.md << EOF
# 📦 Split File: \`$final_name\`

| Info | Value |
|------|-------|
| Original Size | ${_size_mb} MB |
| Parts | ${parts} × ${SPLIT_MB}MB |
| Password | $([ -n "$PASSWORD" ] && echo "🔒 YES" || echo "❌ NO") |
| Status | ✅ **Complete** |

---

## 📥 Download Links

| File | Link |
|------|------|
${download_links}

---

## 🔧 How to Join & Extract

### 🪟 Windows
1. **Download ALL parts** using the links above
2. Open CMD in the download folder
3. Extract each \`.zip\` file first, then join:
\`\`\`cmd
copy /b raw_part_* "${final_name}"
\`\`\`

### 🐧 Linux / Mac
\`\`\`bash
for f in *.part*.zip; do unzip -o "\$f"; done
cat raw_part_* > "${final_name}"
rm raw_part_*
\`\`\`

> 💡 Each part is a **standard ZIP** file. You can open/extract them with **WinRAR, 7-Zip, Windows Explorer** or any archive tool.
EOF

            cd - > /dev/null
            echo "$parts"
          }

          # --- Main Processing ---
          success=0
          fail=0
          all_output_dirs=""

          if [ -z "$URLS" ]; then
            log_err "No URLs provided!"
            exit 1
          fi

          for url in $URLS; do
            echo "----------------------------------------"
            
            # Extract filename from URL
            original_name=$(basename "$url" | sed 's/%20/ /g' | sed 's/[?#].*//')
            [ -z "$original_name" ] || [ "$original_name" = "/" ] && original_name="download_$(date +%s)"
            safe_name=$(sanitize "$original_name")
            temp_file="tmp_download_${SCRIPT_PID}_${safe_name}"
            base_name="${safe_name%.*}"
            output_dir="downloads/complete/$base_name"

            log_info "URL: $url"
            log_info "File: $safe_name"

            # --- Download ---
            if ! download_file "$url" "$temp_file"; then
              err_dir="downloads/failed/${base_name}_$(date +%s)"
              mkdir -p "$err_dir"
              cat > "$err_dir/README.md" << ERREOF
# ❌ Download Failed

| Info | Value |
|------|-------|
| File | \`$safe_name\` |
| URL | \`$url\` |
| Date | $(date) |

## Fixes
1. Check URL in browser
2. Try again later
3. Server may block bots
ERREOF
              fail=$((fail + 1))
              continue
            fi

            size=$(stat -c%s "$temp_file" 2>/dev/null || echo 0)
            size_mb=$((size / 1024 / 1024))
            log_info "Downloaded: $(du -h "$temp_file" | cut -f1)"

            mkdir -p "$output_dir"

            # --- Compression ---
            if need_compress "$safe_name" "$COMPRESSION"; then
              log_info "Compressing to ZIP..."
              zip_name="${base_name}.zip"
              final_path="$output_dir/$zip_name"
              
              if [ -n "$PASSWORD" ] && [ -n "$PASSFILE" ]; then
                7z a -tzip -mx=5 "-p$(cat "$PASSFILE")" "$final_path" "$temp_file" >/dev/null 2>&1
              else
                7z a -tzip -mx=5 "$final_path" "$temp_file" >/dev/null 2>&1
              fi
              
              if [ ! -f "$final_path" ] || [ ! -s "$final_path" ]; then
                log_err "Compression failed!"
                rm -f "$temp_file"
                fail=$((fail + 1))
                continue
              fi
              
              rm -f "$temp_file"
              final_name="$zip_name"
            else
              log_info "Saving as-is..."
              final_name="$safe_name"
              final_path="$output_dir/$safe_name"
              mv "$temp_file" "$final_path"
            fi

            final_size=$(stat -c%s "$final_path" 2>/dev/null || echo 0)
            final_size_mb=$((final_size / 1024 / 1024))

            # --- Split if > 95MB ---
            if [ "$final_size" -gt "$GITHUB_LIMIT_BYTES" ]; then
              log_info "File is ${final_size_mb}MB - splitting required..."
              parts=$(split_large_file "$final_path" "$output_dir" "$base_name" "$final_size" "$final_name")
              
              if [ -z "$parts" ] || [ "$parts" -eq 0 ]; then
                log_err "Split failed!"
                fail=$((fail + 1))
                continue
              fi
              
              log_ok "Split into $parts parts"
            else
              # --- Normal file (no split) -> Create README ---
              log_ok "File size OK (${final_size_mb}MB)"
              
              local folder_enc=$(echo "${base_name}" | sed 's/ /%20/g')
              local file_enc=$(echo "${final_name}" | sed 's/ /%20/g')
              local raw_link="${REPO_URL}/raw/${BRANCH}/downloads/complete/${folder_enc}/${file_enc}"
              
              cat > "$output_dir/README.md" << EOF
# 📁 ${safe_name}

| Info | Value |
|------|-------|
| File | \`${final_name}\` |
| Size | ${final_size_mb} MB |
| Password | $([ -n "$PASSWORD" ] && echo "🔒 YES" || echo "❌ NO") |
| Status | ✅ **Complete** |

---

## 📥 Download

[**Click to Download**](${raw_link})

---

> 💡 This is a standard file. Right-click the link and "Save Link As..." or just click to download.
EOF
            fi

            log_ok "Done: $safe_name"
            success=$((success + 1))
            all_output_dirs="$all_output_dirs $output_dir"
            echo ""
          done

          # Cleanup
          [ -n "$PASSFILE" ] && rm -f "$PASSFILE"
          rm -f tmp_download_${SCRIPT_PID}_* 2>/dev/null

          # --- Batch Mode ---
          if [ "$MODE" = "batch" ] && [ "$success" -gt 1 ]; then
            log_info "Creating batch archive..."
            batch_name="batch_$(date +%Y%m%d_%H%M%S)"
            batch_dir="downloads/complete/$batch_name"
            mkdir -p "$batch_dir"
            for dir in $all_output_dirs; do
              [ -d "$dir" ] && find "$dir" -type f ! -name "README.md" -exec cp -n {} "$batch_dir/" \; 2>/dev/null && rm -rf "$dir"
            done
            log_ok "Batch: $batch_name"
          fi

          # --- Summary ---
          echo ""
          echo "========================================"
          echo " Success: $success | Failed: $fail"
          echo "========================================"
          find downloads/complete -type f ! -name "README.md" -exec ls -lh {} \; 2>/dev/null || echo "  (none)"
          [ "$success" -eq 0 ] && [ "$fail" -gt 0 ] && exit 1

      - name: Commit and Push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ 2>/dev/null || true
          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Download complete [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}" 2>/dev/null || true
          for i in 1 2 3; do
            if git push origin HEAD:"${GITHUB_REF_NAME}" 2>/dev/null; then
              echo "Push successful"
              exit 0
            fi
            echo "Retry $i/3..."
            sleep $((i * 5))
          done
          echo "Push failed after 3 attempts"

      - name: Done
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo " Session Complete!"
          echo "========================================"
